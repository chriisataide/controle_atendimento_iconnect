<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Templates</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .template-test { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .description-preview { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 10px; }
        .template-applied { border-color: #10b981 !important; background: #f0fdf4; }
    </style>
</head>
<body>
    <h1>Teste dos Templates de Tickets</h1>
    
    <div class="template-test">
        <h3>Template: Suporte Técnico</h3>
        <button onclick="testTemplate('suporte-tecnico')">Aplicar Template</button>
        <div id="preview-suporte-tecnico" class="description-preview" style="display: none;"></div>
    </div>
    
    <div class="template-test">
        <h3>Template: Dúvida</h3>
        <button onclick="testTemplate('duvida')">Aplicar Template</button>
        <div id="preview-duvida" class="description-preview" style="display: none;"></div>
    </div>
    
    <div class="template-test">
        <h3>Template: Bug Report</h3>
        <button onclick="testTemplate('bug')">Aplicar Template</button>
        <div id="preview-bug" class="description-preview" style="display: none;"></div>
    </div>
    
    <div class="template-test">
        <h3>Template: Solicitação</h3>
        <button onclick="testTemplate('solicitacao')">Aplicar Template</button>
        <div id="preview-solicitacao" class="description-preview" style="display: none;"></div>
    </div>
    
    <div class="template-test">
        <h3>Template: Melhoria</h3>
        <button onclick="testTemplate('melhoria')">Aplicar Template</button>
        <div id="preview-melhoria" class="description-preview" style="display: none;"></div>
    </div>
    
    <div class="template-test">
        <h3>Template: Acesso</h3>
        <button onclick="testTemplate('acesso')">Aplicar Template</button>
        <div id="preview-acesso" class="description-preview" style="display: none;"></div>
    </div>

    <script>
        // Simulação dos templates (copiar do arquivo real)
        const ticketTemplates = {
            'suporte-tecnico': {
                title: 'Suporte Técnico - [Descreva o problema brevemente]',
                description: `<h4>🔧 PROBLEMA TÉCNICO</h4><p><strong>📋 Descrição do Problema:</strong><br>Descreva detalhadamente qual problema técnico você está enfrentando.</p><p><strong>🔄 Passos para Reproduzir:</strong></p><ol><li>Acesse [sistema/página específica]</li><li>Execute a ação [descreva a ação]</li><li>Observe o resultado [descreva o que acontece]</li></ol>`,
                priority: 'media',
                tags: 'suporte, técnico, sistema'
            },
            'duvida': {
                title: 'Dúvida - [Assunto específico]',
                description: `<h4>❓ DÚVIDA / CONSULTA</h4><p><strong>🎯 Sua Dúvida:</strong><br>Formule sua pergunta de forma clara e específica.</p><p><strong>📝 Contexto da Situação:</strong><br>Explique a situação em que surgiu esta dúvida</p>`,
                priority: 'baixa',
                tags: 'dúvida, consulta, orientação'
            },
            'bug': {
                title: 'Bug Report - [Sistema/Funcionalidade afetada]',
                description: `<h4>🐛 RELATÓRIO DE BUG</h4><p><strong>🎯 Resumo do Bug:</strong><br>Descreva em uma frase o que está funcionando incorretamente.</p><p><strong>🔄 Passos para Reproduzir:</strong></p><ol><li><strong>Pré-condições:</strong> [Estado inicial necessário]</li><li><strong>Passo 1:</strong> [Primeira ação]</li></ol>`,
                priority: 'alta',
                tags: 'bug, erro, defeito'
            }
        };
        
        function testTemplate(templateKey) {
            const template = ticketTemplates[templateKey];
            if (template) {
                const preview = document.getElementById(`preview-${templateKey}`);
                preview.innerHTML = `
                    <h4>Título:</h4>
                    <p><strong>${template.title}</strong></p>
                    <h4>Descrição:</h4>
                    <div>${template.description}</div>
                    <h4>Prioridade:</h4>
                    <p><strong>${template.priority}</strong></p>
                    <h4>Tags:</h4>
                    <p><strong>${template.tags}</strong></p>
                `;
                preview.style.display = 'block';
                preview.parentElement.classList.add('template-applied');
                
                setTimeout(() => {
                    preview.parentElement.classList.remove('template-applied');
                }, 3000);
            }
        }
    </script>
</body>
</html>
