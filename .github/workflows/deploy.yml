name: 🚀 CI/CD - iConnect Deploy Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ========== TESTES E QUALIDADE ==========
  test:
    name: 🧪 Tests & Quality Checks
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest pytest-django pytest-cov factory-boy

    - name: 🔍 Lint with flake8
      run: |
        pip install flake8 black isort
        flake8 --max-line-length=120 --exclude=migrations,venv,staticfiles,node_modules .
        black --check --line-length=120 --exclude='/(migrations|venv|staticfiles)/' .
        isort --check-only --profile black --line-length=120 --skip migrations --skip venv .

    - name: 🧪 Run tests
      env:
        DEBUG: True
        SECRET_KEY: test-secret-key-for-github-actions
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
      run: |
        mkdir -p logs
        python manage.py migrate
        coverage run --source=dashboard,controle_atendimento manage.py test dashboard.tests -v2
        coverage report --fail-under=60
        coverage xml

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ========== SECURITY SCAN ==========
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔍 Run safety check
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt || true

    - name: 🛡️ Run bandit security linter
      run: |
        pip install bandit
        bandit -r . -x tests/

  # ========== BUILD DOCKER ==========
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏗️ Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/iconnect:latest
          ${{ secrets.DOCKER_USERNAME }}/iconnect:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ========== DEPLOY STAGING ==========
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🚀 Deploy to staging server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT }}
        script: |
          cd /opt/iconnect-staging
          docker-compose pull
          docker-compose up -d
          docker-compose exec web python manage.py migrate
          docker-compose exec web python manage.py collectstatic --noinput

  # ========== DEPLOY PRODUCTION ==========
  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🎯 Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT }}
        script: |
          cd /opt/iconnect-production
          
          # Backup antes do deploy
          docker-compose exec db pg_dump -U iconnect_user iconnect_db > backup_$(date +%Y%m%d_%H%M%S).sql
          
          # Deploy
          docker-compose pull
          docker-compose up -d
          
          # Migrations e static files
          docker-compose exec web python manage.py migrate
          docker-compose exec web python manage.py collectstatic --noinput
          
          # Health check
          sleep 30
          curl -f http://localhost/health/ || exit 1

    - name: 📺 Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

  # ========== CLEANUP ==========
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: 🗑️ Cleanup old Docker images
      run: |
        docker image prune -f
        docker container prune -f
