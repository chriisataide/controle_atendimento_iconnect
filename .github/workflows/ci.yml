name: CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install lint tools
      run: pip install flake8 black isort
    - name: Run flake8
      run: flake8 --config .flake8 --max-line-length=120 --exclude=migrations,venv,staticfiles,node_modules .
    - name: Run black check
      run: black --check --line-length=120 --exclude='/(migrations|venv|staticfiles)/' .
      continue-on-error: true
    - name: Run isort check
      run: isort --check-only --profile black --line-length=120 --skip migrations --skip venv .
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: iconnect_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: controle_atendimento.settings
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/iconnect_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_TASK_ALWAYS_EAGER: 'true'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest pytest-django pytest-cov factory-boy
    - name: Create log directory
      run: mkdir -p logs
    - name: Run migrations
      run: python manage.py migrate --run-syncdb
    - name: Run tests with coverage
      run: |
        coverage run --source=dashboard,controle_atendimento manage.py test dashboard.tests -v2
        coverage report --fail-under=60
        coverage xml -o coverage.xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install audit tools
      run: pip install pip-audit
    - name: Check dependencies for vulnerabilities
      run: pip-audit -r requirements.txt || true
      continue-on-error: true
