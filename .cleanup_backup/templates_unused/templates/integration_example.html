<!-- Exemplo de integração no template base -->
<!-- Adicionar no <head> -->
<script>
// Configuração global para notificações
window.WEBSOCKET_URL = "{% if request.is_secure %}wss{% else %}ws{% endif %}://{{ request.get_host }}/ws/notifications/";
window.USER_ID = {{ request.user.id|default:'null' }};
window.IS_AUTHENTICATED = {% if request.user.is_authenticated %}true{% else %}false{% endif %};
</script>

<!-- Adicionar antes do </body> -->
{% if request.user.is_authenticated %}
    <!-- Sistema de Notificações -->
    <script src="{% static 'js/notifications.js' %}"></script>
    
    <!-- Badge de notificações no header/navbar -->
    {% include 'components/notifications.html' %}
    
    <!-- CSS adicional -->
    <style>
        /* Ajustes para o tema Material Dashboard */
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e91e63;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            min-width: 16px;
            text-align: center;
            animation: pulse 2s infinite;
            border: 2px solid white;
            font-weight: 600;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* Integração com navbar existente */
        .navbar .notification-header-widget {
            margin-right: 10px;
        }
        
        .navbar .notification-header-widget .btn {
            padding: 8px;
            min-width: auto;
        }
        
        /* Sobrepor z-index do material dashboard */
        .notification-container {
            z-index: 9999 !important;
        }
        
        .notification-panel {
            z-index: 9999 !important;
        }
        
        .connection-indicator {
            z-index: 9998 !important;
        }
    </style>
{% endif %}

<!-- Exemplo de uso em templates específicos -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Aguardar sistema de notificações carregar
    if (window.notificationSystem && window.notificationSystem.isConnected) {
        initPageSpecificNotifications();
    } else {
        // Tentar novamente em 1 segundo
        setTimeout(() => {
            if (window.notificationSystem) {
                initPageSpecificNotifications();
            }
        }, 1000);
    }
});

function initPageSpecificNotifications() {
    // Configurações específicas da página
    console.log('Notificações inicializadas para esta página');
    
    // Exemplo: solicitar notificações específicas
    if (window.location.pathname.includes('/tickets/')) {
        // Página de tickets - pode configurar alertas específicos
        console.log('Configurando alertas para página de tickets');
    }
}

// Exemplo de envio manual de notificação (para testes)
function testNotification() {
    if (window.notificationSystem) {
        window.notificationSystem.showNotification({
            id: Date.now(),
            title: 'Notificação de Teste',
            message: 'Esta é uma notificação de teste do sistema',
            type: 'info',
            timestamp: new Date().toISOString()
        });
    }
}
</script>
