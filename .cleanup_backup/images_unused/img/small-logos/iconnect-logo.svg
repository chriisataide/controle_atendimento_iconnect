<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
    <title>iConnect Logo</title>
    <g id="iconnect-logo" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Background Circle -->
        <circle cx="12" cy="12" r="12" fill="#e91e63"/>
        
        <!-- Letter 'i' -->
        <circle cx="8.5" cy="7" r="1.5" fill="white"/>
        <rect x="7.5" y="9" width="2" height="8" rx="1" fill="white"/>
        
        <!-- Connect Symbol -->
        <circle cx="15.5" cy="10" r="1.5" fill="white" opacity="0.9"/>
        <circle cx="15.5" cy="14" r="1.5" fill="white" opacity="0.9"/>
        <rect x="10" y="11" width="4" height="2" rx="1" fill="white" opacity="0.7"/>
        
        <!-- Decorative Elements -->
        <circle cx="19" cy="8" r="1" fill="white" opacity="0.4"/>
        <circle cx="19" cy="16" r="1" fill="white" opacity="0.4"/>
        <circle cx="5" cy="12" r="1" fill="white" opacity="0.3"/>
    </g>
</svg>
