# ================================
# CONTROLE ATENDIMENTO ICONNECT
# Docker Compose - Ambiente Completo
# ================================
# SEGURANÇA: Credenciais lidas de .env — NUNCA comite credenciais aqui.

services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: iconnect_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iconnect_db}
      POSTGRES_USER: ${POSTGRES_USER:-iconnect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # SEGURANÇA: Não expor porta do DB para fora do Docker
    # Para acesso local de debug, descomente a linha abaixo:
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iconnect_user -d iconnect_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: iconnect_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env}
    volumes:
      - redis_data:/data
    # SEGURANÇA: Não expor Redis para fora do Docker
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # Aplicação Django
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iconnect_web
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:?Defina SECRET_KEY no .env}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-iconnect_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-iconnect_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:?Defina DJANGO_SUPERUSER_PASSWORD no .env}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@iconnect.com}
    volumes:
      # SEGURANÇA: Não montar código-fonte em produção (usa COPY do Dockerfile).
      # Para desenvolvimento local com hot-reload, descomente:
      # - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "chmod +x docker/docker-entrypoint-dev.sh && ./docker/docker-entrypoint-dev.sh"
    networks:
      - backend
      - frontend

  # Worker Celery
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iconnect_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-iconnect_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-iconnect_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A controle_atendimento worker --loglevel=info
    networks:
      - backend

  # Monitor Celery (protegido por autenticação)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iconnect_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?Defina FLOWER_PASSWORD no .env}
    depends_on:
      - redis
      - celery
    command: celery -A controle_atendimento flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    networks:
      - backend
      - frontend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: iconnect_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./ssl:/etc/ssl/certs
    depends_on:
      - web
      - flower
    networks:
      - backend
      - frontend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  backend:
    name: iconnect_backend
    internal: true
  frontend:
    name: iconnect_frontend
