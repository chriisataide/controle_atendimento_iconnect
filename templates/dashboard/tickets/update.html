{% extends 'base.html' %}

{% block page_title %}Editar Ticket #{{ object.numero }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-lg-8 mx-auto">
      <div class="card">
        <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
          <div class="bg-gradient-primary shadow-primary border-radius-lg pt-4 pb-3">
            <h6 class="text-white text-capitalize ps-3 mb-0">Editar Ticket #{{ object.numero }}</h6>
          </div>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            
            <div class="row">
              <div class="col-md-6">
                <div class="input-group input-group-outline mb-3">
                  <label class="form-label">Cliente</label>
                  <select class="form-control" name="cliente" required>
                    {% for cliente in clientes %}
                      <option value="{{ cliente.id }}" {% if cliente.id == object.cliente.id %}selected{% endif %}>
                        {{ cliente.nome }} ({{ cliente.email }})
                      </option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="input-group input-group-outline mb-3">
                  <label class="form-label">Categoria</label>
                  <select class="form-control" name="categoria" required>
                    {% for categoria in categorias %}
                      <option value="{{ categoria.id }}" {% if categoria.id == object.categoria.id %}selected{% endif %}>
                        {{ categoria.nome }}
                      </option>
                    {% endfor %}
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="input-group input-group-outline mb-3">
                  <label class="form-label">Status</label>
                  <select class="form-control" name="status" required>
                    <option value="aberto" {% if object.status == 'aberto' %}selected{% endif %}>Aberto</option>
                    <option value="em_andamento" {% if object.status == 'em_andamento' %}selected{% endif %}>Em Andamento</option>
                    <option value="aguardando_cliente" {% if object.status == 'aguardando_cliente' %}selected{% endif %}>Aguardando Cliente</option>
                    <option value="resolvido" {% if object.status == 'resolvido' %}selected{% endif %}>Resolvido</option>
                    <option value="fechado" {% if object.status == 'fechado' %}selected{% endif %}>Fechado</option>
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="input-group input-group-outline mb-3">
                  <label class="form-label">Prioridade</label>
                  <select class="form-control" name="prioridade" required>
                    <option value="baixa" {% if object.prioridade == 'baixa' %}selected{% endif %}>Baixa</option>
                    <option value="media" {% if object.prioridade == 'media' %}selected{% endif %}>Média</option>
                    <option value="alta" {% if object.prioridade == 'alta' %}selected{% endif %}>Alta</option>
                    <option value="critica" {% if object.prioridade == 'critica' %}selected{% endif %}>Crítica</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="input-group input-group-outline mb-3">
              <label class="form-label">Agente Responsável</label>
              <select class="form-control" name="agente">
                <option value="">Não atribuído</option>
                {% for agente in agentes %}
                  <option value="{{ agente.id }}" {% if object.agente and agente.id == object.agente.id %}selected{% endif %}>
                    {{ agente.get_full_name|default:agente.username }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="input-group input-group-outline mb-3">
              <input type="text" class="form-control" name="titulo" value="{{ object.titulo }}" required>
              <label class="form-label">Título do Ticket</label>
            </div>

            <div class="input-group input-group-outline mb-3">
              <textarea class="form-control" rows="6" name="descricao" required>{{ object.descricao }}</textarea>
              <label class="form-label">Descrição</label>
            </div>

            <div class="d-flex justify-content-between">
              <a href="{% url 'dashboard:ticket_detail' object.pk %}" class="btn btn-light">
                <i class="material-icons">arrow_back</i>&nbsp;&nbsp;Voltar
              </a>
              <div>
                <a href="{% url 'dashboard:ticket_list' %}" class="btn btn-light me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                  <i class="material-icons">save</i>&nbsp;&nbsp;Salvar Alterações
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
