<!-- Componente de Notificações para Templates -->
{% load static %}

<!-- Badge de notificações no header -->
<div class="notification-header-widget" style="position: relative; display: inline-block;">
    <button class="btn btn-icon-only btn-rounded btn-outline-secondary mb-0" 
            onclick="toggleNotificationPanel()" 
            data-bs-toggle="tooltip" 
            data-bs-placement="bottom" 
            title="Notificações">
        <i class="material-symbols-rounded">notifications</i>
        <span class="notification-badge" id="notification-count" style="display: none;">0</span>
    </button>
    
    <!-- Painel de notificações -->
    <div class="notification-panel" id="notification-panel" style="display: none;">
        <div class="notification-panel-header">
            <h6 class="notification-panel-title">Notificações</h6>
            <div class="notification-panel-actions">
                <button class="btn btn-sm btn-outline-primary" onclick="markAllAsRead()">
                    Marcar todas como lidas
                </button>
                <button class="btn btn-sm btn-icon-only" onclick="toggleNotificationPanel()">
                    <i class="material-symbols-rounded">close</i>
                </button>
            </div>
        </div>
        
        <div class="notification-panel-body" id="notification-list">
            <div class="notification-empty">
                <i class="material-icons text-muted">notifications_none</i>
                <p class="text-muted">Nenhuma notificação</p>
            </div>
        </div>
        
        <div class="notification-panel-footer">
            <a href="{% url 'dashboard:notifications' %}" class="btn btn-link">
                Ver todas as notificações
            </a>
        </div>
    </div>
</div>

<style>
/* Estilos do componente de notificações */
.notification-header-widget {
    position: relative;
}

.notification-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ef4444;
    color: white;
    border-radius: 50%;
    padding: 2px 6px;
    font-size: 11px;
    min-width: 18px;
    text-align: center;
    animation: pulse 2s infinite;
    border: 2px solid white;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.notification-panel {
    position: absolute;
    top: 100%;
    right: 0;
    width: 380px;
    max-height: 500px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    z-index: 1050;
    border: 1px solid #e2e8f0;
    margin-top: 10px;
}

.notification-panel-header {
    padding: 20px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.notification-panel-title {
    margin: 0;
    font-weight: 600;
    color: #334155;
}

.notification-panel-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}

.notification-panel-body {
    max-height: 300px;
    overflow-y: auto;
    padding: 10px 0;
}

.notification-empty {
    text-align: center;
    padding: 40px 20px;
}

.notification-empty i {
    font-size: 48px;
    margin-bottom: 10px;
    display: block;
}

.notification-item {
    padding: 15px 20px;
    border-bottom: 1px solid #f8fafc;
    cursor: pointer;
    transition: background-color 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
}

.notification-item:hover {
    background-color: #f8fafc;
}

.notification-item.unread {
    background-color: #ecfeff;
    border-left: 3px solid #06b6d4;
}

.notification-item.unread::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #06b6d4;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
}

.notification-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
}

.notification-icon.new-ticket {
    background: #ecfeff;
    color: #06b6d4;
}

.notification-icon.sla-warning {
    background: #fff7ed;
    color: #f59e0b;
}

.notification-icon.sla-breach {
    background: #fef2f2;
    color: #dc2626;
}

.notification-icon.message {
    background: #dcfce7;
    color: #22c55e;
}

.notification-content {
    flex: 1;
}

.notification-title {
    font-weight: 600;
    font-size: 14px;
    color: #334155;
    margin: 0 0 5px 0;
    line-height: 1.3;
}

.notification-message {
    font-size: 13px;
    color: #64748b;
    margin: 0 0 8px 0;
    line-height: 1.4;
}

.notification-time {
    font-size: 11px;
    color: #94a3b8;
}

.notification-panel-footer {
    padding: 15px 20px;
    border-top: 1px solid #e2e8f0;
    text-align: center;
}

/* Responsivo */
@media (max-width: 768px) {
    .notification-panel {
        width: 320px;
        right: -20px;
    }
}

@media (max-width: 480px) {
    .notification-panel {
        width: 280px;
        right: -40px;
    }
}
</style>

<script>
// JavaScript para o painel de notificações
function toggleNotificationPanel() {
    const panel = document.getElementById('notification-panel');
    const isVisible = panel.style.display !== 'none';
    
    if (isVisible) {
        panel.style.display = 'none';
        document.removeEventListener('click', closeNotificationPanel);
    } else {
        panel.style.display = 'block';
        loadNotifications();
        
        // Fechar ao clicar fora
        setTimeout(() => {
            document.addEventListener('click', closeNotificationPanel);
        }, 100);
    }
}

function closeNotificationPanel(event) {
    const panel = document.getElementById('notification-panel');
    const widget = document.querySelector('.notification-header-widget');
    
    if (!widget.contains(event.target)) {
        panel.style.display = 'none';
        document.removeEventListener('click', closeNotificationPanel);
    }
}

function loadNotifications() {
    fetch('/api/notifications/recent/')
        .then(response => response.json())
        .then(data => {
            displayNotifications(data.notifications);
            updateNotificationCount(data.unread_count);
        })
        .catch(error => {
            console.error('Erro ao carregar notificações:', error);
        });
}

function displayNotifications(notifications) {
    const listElement = document.getElementById('notification-list');
    
    if (notifications.length === 0) {
        listElement.innerHTML = `
            <div class="notification-empty">
                <i class="material-icons text-muted">notifications_none</i>
                <p class="text-muted">Nenhuma notificação</p>
            </div>
        `;
        return;
    }
    
    const notificationItems = notifications.map(notification => {
        const iconClass = getNotificationIconClass(notification.type);
        const timeAgo = formatTimeAgo(notification.created_at);
        
        return `
            <div class="notification-item ${notification.is_read ? '' : 'unread'}" 
                 onclick="viewNotification(${notification.id}, '${notification.ticket_id || ''}')">
                <div class="notification-icon ${iconClass}">
                    <i class="material-symbols-rounded">${getNotificationIcon(notification.type)}</i>
                </div>
                <div class="notification-content">
                    <h6 class="notification-title">${notification.title}</h6>
                    <p class="notification-message">${notification.message}</p>
                    <span class="notification-time">${timeAgo}</span>
                </div>
            </div>
        `;
    }).join('');
    
    listElement.innerHTML = notificationItems;
}

function getNotificationIconClass(type) {
    const classes = {
        'new_ticket': 'new-ticket',
        'sla_warning': 'sla-warning',
        'sla_breach': 'sla-breach',
        'new_message': 'message',
        'ticket_updated': 'new-ticket'
    };
    return classes[type] || 'new-ticket';
}

function getNotificationIcon(type) {
    const icons = {
        'new_ticket': 'assignment',
        'sla_warning': 'warning',
        'sla_breach': 'error',
        'new_message': 'message',
        'ticket_updated': 'update'
    };
    return icons[type] || 'notifications';
}

function formatTimeAgo(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'Agora mesmo';
    if (diff < 3600000) return `${Math.floor(diff/60000)}min atrás`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}h atrás`;
    
    return date.toLocaleDateString('pt-BR');
}

function viewNotification(notificationId, ticketId) {
    // Marcar como lida
    markNotificationAsRead(notificationId);
    
    // Redirecionar para o ticket se disponível
    if (ticketId) {
        window.location.href = `/dashboard/tickets/${ticketId}/`;
    }
}

function markNotificationAsRead(notificationId) {
    fetch(`/api/notifications/${notificationId}/mark-read/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'Content-Type': 'application/json'
        }
    }).then(() => {
        // Atualizar interface
        const notificationElement = document.querySelector(`[onclick*="${notificationId}"]`);
        if (notificationElement) {
            notificationElement.classList.remove('unread');
        }
        
        // Atualizar contador
        const badge = document.getElementById('notification-count');
        const currentCount = parseInt(badge.textContent) || 0;
        if (currentCount > 0) {
            const newCount = currentCount - 1;
            updateNotificationCount(newCount);
        }
    });
}

function markAllAsRead() {
    fetch('/api/notifications/mark-all-read/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'Content-Type': 'application/json'
        }
    }).then(() => {
        // Remover classe unread de todas as notificações
        document.querySelectorAll('.notification-item.unread').forEach(item => {
            item.classList.remove('unread');
        });
        
        // Zerar contador
        updateNotificationCount(0);
    });
}

function updateNotificationCount(count) {
    const badge = document.getElementById('notification-count');
    if (count > 0) {
        badge.textContent = count > 99 ? '99+' : count;
        badge.style.display = 'inline-block';
    } else {
        badge.style.display = 'none';
    }
}

// Atualizar contador quando WebSocket receber notificação
if (window.notificationSystem) {
    const originalShowNotification = window.notificationSystem.showNotification;
    window.notificationSystem.showNotification = function(notification) {
        originalShowNotification.call(this, notification);
        
        // Atualizar contador do header
        const badge = document.getElementById('notification-count');
        const currentCount = parseInt(badge.textContent) || 0;
        updateNotificationCount(currentCount + 1);
    };
}
</script>
